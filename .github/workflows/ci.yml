name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/docs/reference/nx-cloud-cli#npx-nxcloud-startcirun
      - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - uses: pnpm/action-setup@v6

      # Cache node_modules
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      - name: Format check
        run: pnpm nx record -- pnpm nx format:check --base="remotes/origin/main"

      - name: Lint, test, build, typecheck, lint-css (all projects)
        run: pnpm nx run-many -t lint test build typecheck lint-css

      - name: E2E — Playwright flows + axe a11y sweep (real worker in miniflare)
        run: pnpm nx run-many -t e2e

      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/docs/features/ci-features/self-healing-ci
      - run: pnpm nx fix-ci
        if: always()

  # Trunk-based release: every green push to main versions from conventional
  # commits, tags, updates the changelog and creates the GitHub release.
  release:
    runs-on: ubuntu-latest
    needs: main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      HUSKY: 0 # git hooks are for humans; the release commit is machine-generated
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        id: release
        # --first-release is required when no v* tag exists yet
        run: |
          before=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          if [ -n "$before" ]; then
            pnpm nx release --skip-publish
          else
            pnpm nx release --skip-publish --first-release
          fi
          after=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          # Only a changed tag is a release: a push with no releasable commits leaves it
          # untouched, and the notify step downstream keys off this being non-empty.
          if [ -n "$after" ] && [ "$after" != "$before" ]; then
            echo "version=${after#v}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tell Slack, but only when a new tag was actually cut. The message is built and
      # sent in tested TypeScript (@dev-blog/notify, through the release plugin's notify
      # executor), not curl and jq: the failure that happens is Slack answering 200 while
      # refusing the message, and only a unit test pins that down. Missing secrets skip
      # the step rather than failing it.
      - name: Announce the release to Slack
        if: steps.release.outputs.version != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.release.outputs.version }}
        run: pnpm nx run @dev-blog/release:notify

  # Deploy to Cloudflare Workers on every green push to main.
  # Requires the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets;
  # skips gracefully until they exist.
  #
  # It waits for `release`, and not merely for `main`, because the footer shows the
  # version: the tag this deploy IS carries is the one the release job cuts, and until
  # it exists there is nothing to read. Deploying in parallel would ship the previous
  # version, and only until the next push — a bug nobody would ever catch in the act.
  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
        with:
          # The tag is the version. A shallow checkout has no tags at all.
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Baked into the bundle by apps/blog/vite.config.mts, and part of the Nx cache
      # key (nx.json → sharedGlobals), so this build cannot be served from the cache
      # the CI build filled before the tag existed.
      - name: Resolve the released version
        run: |
          echo "APP_VERSION=$(git describe --tags --abbrev=0 --match 'v*' | sed 's/^v//')" >> "$GITHUB_ENV"
          echo "GIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare Workers
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret not set — skipping deploy."
            exit 0
          fi
          echo "Deploying v$APP_VERSION ($GIT_HASH)"
          pnpm nx run blog:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
