name: Security

# A vulnerability scan is not like a test. A test goes red because the CODE changed; a
# scan goes red because the WORLD changed — a CVE was published against a dependency
# nobody touched. So it runs on two triggers, and it needs both:
#
#   - when the dependencies change, because that is when WE introduce something;
#   - every Monday, because that is when the world does.
#
# Running it on every push would tell us the same thing forty times a week and teach us
# to stop reading it.
on:
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'
      - 'plugins/security/**'
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'
      - 'plugins/security/**'
  schedule:
    # Monday 06:00 UTC. Early enough that a bad Monday is still a Monday.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Vulnerabilities & secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # The job runs on the plain ubuntu runner (node, pnpm and docker are all there).
      # Nx and the executor run on the runner; the executor then starts the pinned trivy
      # CONTAINER for the scan itself. The `ci` configuration is what forces that, so a
      # result never depends on whichever trivy a runner happens to ship.
      #
      # `container: aquasec/trivy` at job level would be the wrong shape: every step
      # would run inside that image, which has no node and no pnpm, and nx could not
      # start at all.
      #
      # The DB is NOT cached, and the reason is its SHELF LIFE, not its size. Size was
      # the obvious objection and it is wrong: 1.1 GB on disk, but 70 MB packed with
      # zstd, which is what actions/cache stores. It expires in 21 hours, and these runs
      # are a WEEK apart — so a restored cache would always be stale, trivy would throw
      # it away and pull the fresh 100 MB layer anyway, and we would upload another
      # 70 MB for next time. It is not incremental either, and cannot be: the DB is a
      # single blob shipped as one OCI layer. Verified, not assumed.
      - name: Scan
        run: pnpm nx run @dev-blog/security:scan:ci

      # Only on the schedule, and only when it broke: a PR already shows a red check, and
      # a message that arrives every week regardless is a message nobody opens.
      #
      # chat.postMessage, not an incoming webhook: a webhook is welded to one channel for
      # good, while a bot token can be pointed anywhere by changing a variable. And a
      # plain curl rather than a Slack action — one less third party inside a job whose
      # entire purpose is to police third parties.
      - name: Tell Slack
        if: failure() && github.event_name == 'schedule'
        env:
          TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHANNEL" ]; then
            echo "SLACK_BOT_TOKEN or SLACK_CHANNEL_ID is not set — skipping."
            exit 0
          fi

          PAYLOAD=$(jq -n --arg channel "$CHANNEL" --arg url "$RUN_URL" '{
            channel: $channel,
            text: "The weekly security scan went red",
            blocks: [
              {
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: ":rotating_light: *The weekly security scan went red.*\n\nNothing was committed. A CVE was published against a dependency that was already there — which is the one thing only this scan can catch."
                }
              },
              {
                type: "actions",
                elements: [
                  {
                    type: "button",
                    text: { type: "plain_text", text: "See the run" },
                    url: $url
                  }
                ]
              }
            ]
          }')

          RESPONSE=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$PAYLOAD")

          # Slack answers 200 even when it refuses — the truth is in `ok`. A curl that
          # "succeeded" while the message went nowhere is exactly the silent failure this
          # repository keeps finding.
          if [ "$(printf '%s' "$RESPONSE" | jq -r '.ok')" != "true" ]; then
            echo "Slack refused it: $(printf '%s' "$RESPONSE" | jq -r '.error')"
            exit 1
          fi

          echo "Posted to Slack."
