name: Security

# A vulnerability scan is not like a test. A test goes red because the CODE changed; a
# scan goes red because the WORLD changed — a CVE was published against a dependency
# nobody touched. So it runs on two triggers, and it needs both:
#
#   - when the dependencies change, because that is when WE introduce something;
#   - every Monday, because that is when the world does.
#
# Running it on every push would tell us the same thing forty times a week and teach us
# to stop reading it.
on:
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'
      - 'plugins/security/**'
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'
      - 'plugins/security/**'
  schedule:
    # Monday 06:00 UTC. Early enough that a bad Monday is still a Monday.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Vulnerabilities & secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # The job runs on the plain ubuntu runner (node, pnpm, docker are all there). Nx
      # and the executor run on the runner; the executor then starts the pinned trivy
      # CONTAINER for the scan itself. The `ci` configuration is what forces that, so a
      # result never depends on whichever trivy a runner happens to ship.
      #
      # `container: aquasec/trivy` at job level would be the wrong shape: every step
      # would run inside that image, which has no node and no pnpm, and nx could not
      # start at all.
      #
      # The DB is NOT cached, deliberately. It is a single 1.1 GB file: saving and
      # restoring it through actions/cache costs more than the ~12s trivy takes to
      # download it compressed. A cache step that makes CI slower is worse than none.
      - name: Scan
        run: pnpm nx run @dev-blog/security:scan:ci

      # Only on the schedule, and only when it broke: a PR already shows a red check,
      # and a message that arrives every week regardless is a message nobody opens.
      - name: Tell Slack
        if: failure() && github.event_name == 'schedule'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No SLACK_WEBHOOK_URL secret — skipping the notification."
            exit 0
          fi
          RUN="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          curl -sS -X POST -H 'Content-type: application/json' --data @- "$WEBHOOK" <<EOF
          {
            "text": ":rotating_light: dev-blog — the weekly security scan went red.\nNothing was committed: a CVE was published against a dependency that was already there.\n<$RUN|See the run>"
          }
          EOF
